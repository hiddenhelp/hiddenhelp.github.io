<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidden Help Admin</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Sora+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
/* ── Variables ─────────────────────────────────────────────── */
:root {
  --bg:        #F4F5F1;
  --bg2:       #EAECE5;
  --bg3:       #DFE2D9;
  --panel:     #FFFFFF;
  --border:    #D6DACF;
  --text:      #181A17;
  --text2:     #535A51;
  --text3:     #6B7367;
  --accent:        #2E6B4E;
  --accent-bg:     #E8EEEB;
  --accent-border: #A9CBB6;
  --accent-hover:  #D7E7DD;
  --green:     #3A7D44;
  --green-bg:  #E8F4EA;
  --blue:      #1A5FA8;
  --blue-bg:   #E5EFFE;
  --amber:     #8A6000;
  --amber-bg:  #FEF3D8;
  --red:       #9B2020;
  --red-bg:    #FDEAEA;
  --purple:    #5B3D8A;
  --purple-bg: #F0EAFE;
  --radius:    8px;
  --radius-sm: 5px;
  --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --font:      'Sora', sans-serif;
  --sidebar-w: 380px;
}

/* ── Reset ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); font-size: 14px; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
button { font-family: var(--font); cursor: pointer; border: none; background: none; }
input, textarea, select { font-family: var(--font); }
a { color: inherit; text-decoration: none; }

/* ── Login ─────────────────────────────────────────────────── */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
}
.login-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 48px 40px;
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow);
  text-align: center;
}
.login-logo {
  font-size: 22px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -.3px;
  margin-bottom: 6px;
}
.login-sub {
  font-size: 13px;
  color: var(--text3);
  margin-bottom: 36px;
}
.login-label {
  display: block;
  text-align: left;
  font-size: 12px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 6px;
}
.login-input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color .15s;
}
.login-input:focus { border-color: var(--accent); }
.login-btn {
  width: 100%;
  margin-top: 16px;
  padding: 11px;
  background: var(--accent);
  color: #fff;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 500;
  transition: opacity .15s;
}
.login-btn:hover { opacity: .88; }
.login-btn:disabled { opacity: .5; cursor: not-allowed; }
.login-msg {
  margin-top: 16px;
  font-size: 13px;
  color: var(--text2);
  min-height: 20px;
}
.login-msg.ok  { color: var(--green); }
.login-msg.err { color: var(--red); }
.phone-warn { color: var(--red); font-size: 12px; white-space: nowrap; display: inline-flex; align-items: center; gap: 4px; vertical-align: text-bottom; }
.phone-warn svg { flex-shrink: 0; }

/* ── App shell ─────────────────────────────────────────────── */
#app { display: none; height: 100vh; flex-direction: column; }
#app.visible { display: flex; }

.app-header {
  height: 48px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  z-index: 10;
}
.app-logo {
  font-size: 15px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -.2px;
  margin-right: auto;
}
.user-email {
  font-size: 12px;
  color: var(--text3);
}
.sign-out-btn {
  font-size: 12px;
  color: var(--text2);
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  transition: background .15s;
}
.sign-out-btn:hover { background: var(--bg2); }

.app-body {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── Sidebar ───────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-top {
  padding: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
}
.search-input {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  outline: none;
}
.search-input:focus { border-color: var(--accent); }
.filter-row {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.pill {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 99px;
  border: 1px solid var(--border);
  color: var(--text2);
  background: var(--bg);
  cursor: pointer;
  transition: all .12s;
  white-space: nowrap;
}
.pill.active {
  background: var(--accent-bg);
  border-color: var(--accent-border);
  color: var(--accent);
  font-weight: 500;
}
.pill-sep {
  margin: 0 3px;
  opacity: 0.4;
}
#postcode-filter {
  font-size: 11px;
  padding: 3px 6px;
  border-radius: 99px;
  border: 1px solid var(--border);
  color: var(--text2);
  background: var(--bg);
  cursor: pointer;
  flex-shrink: 0;
  max-width: 130px;
}
#postcode-filter.active {
  background: var(--accent-bg);
  border-color: var(--accent-border);
  color: var(--accent);
  font-weight: 500;
}
.pill-count {
  font-size: 11px;
  opacity: 0.6;
  font-weight: 400;
}
.ref-list {
  flex: 1;
  overflow-y: auto;
}
.ref-list-empty {
  padding: 32px 16px;
  text-align: center;
  color: var(--text3);
  font-size: 13px;
}

/* ── Referral list item ────────────────────────────────────── */
.ref-item {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .1s;
}
.ref-item:hover { background: var(--bg); }
.ref-item.selected {
  background: var(--accent-bg);
  border-left: 3px solid var(--accent);
  padding-left: 11px;
}
.ref-item-top {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 3px 8px;
  align-items: baseline;
  margin-bottom: 3px;
}
.ref-id-tags {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  min-width: 0;
}
.ref-num { font-size: 13px; font-weight: 600; color: var(--text); }
.ref-date { font-size: 11px; color: var(--text3); white-space: nowrap; justify-self: end; }
.ref-name { font-size: 13px; color: var(--text); margin-bottom: 1px; }
.ref-org  { font-size: 11px; color: var(--text3); margin-bottom: 5px; }
.tags { display: flex; gap: 4px; flex-wrap: wrap; }
.tag {
  font-size: 11px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 99px;
}
.tag-delivery   { background: var(--blue-bg);   color: var(--blue); }
.tag-collection { background: var(--green-bg);  color: var(--green); }
.tag-new        { background: var(--bg2);        color: var(--text2); }
.tag-wishlist   { background: var(--amber-bg);  color: var(--amber); }
.tag-gathered   { background: var(--purple-bg); color: var(--purple); }
.tag-completed  { background: var(--green-bg);  color: var(--green); }
.tag-cancelled  { background: var(--red-bg);    color: var(--red); }
.tag-rejected   { background: var(--bg3);        color: var(--text2); }
.tag-crisis     { background: var(--bg2);        color: var(--text2); }
.tag-vuln       { background: var(--red-bg);    color: var(--red); }

/* ── Detail panel ──────────────────────────────────────────── */
.detail {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}
.detail-empty {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text3);
  font-size: 13px;
}
.detail-header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  flex-shrink: 0;
}
.detail-header-left h2 {
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -.2px;
  margin-bottom: 3px;
}
.detail-header-left p { font-size: 12px; color: var(--text2); }
.detail-actions { display: flex; gap: 8px; flex-shrink: 0; }
.btn-done { border-color: var(--green); color: var(--green); background: var(--green-bg); }
.btn-done:hover { background: var(--green-bg); filter: brightness(.97); }
.btn {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--text);
  transition: background .12s;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn svg { flex-shrink: 0; }
.btn:hover { background: var(--bg2); }
.btn-maps { background: var(--blue-bg); border-color: #B5CEFF; color: var(--blue); }
.btn-maps:hover { background: #D8E8FF; }
.detail-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── Stat row ──────────────────────────────────────────────── */
.stat-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.stat {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
}
.stat label {
  font-size: 11px;
  color: var(--text3);
  display: block;
  margin-bottom: 3px;
  font-weight: 500;
}
.stat span { font-size: 14px; font-weight: 500; }
.stat-completed { color: var(--green); }
.stat-gathered  { color: var(--purple); }
.stat-cancelled { color: var(--red); }
.stat-wishlist  { color: var(--amber); }
.stat-new       { color: var(--text2); }

/* ── Cards ─────────────────────────────────────────────────── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.card-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 10px;
}
.card-title-row {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}
.card-title-row .card-title { margin-bottom: 0; flex: 1; }
.field { margin-bottom: 8px; }
.field:last-child { margin-bottom: 0; }
.field label { font-size: 11px; color: var(--text3); display: block; margin-bottom: 2px; font-weight: 500; }
.field span, .field a { font-size: 13px; color: var(--text); }
.field a { color: var(--blue); }
.field a:hover { text-decoration: underline; }
.address-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.6;
  margin-bottom: 10px;
}
.address-note { font-size: 11px; color: var(--text3); margin-top: 4px; }
.address-note svg { vertical-align: -3px; }

/* ── Milestones ────────────────────────────────────────────── */
.ms-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.ms-row:last-child { border-bottom: none; }
.ms-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.ms-dot-done    { background: var(--green); }
.ms-dot-next    { background: var(--amber); }
.ms-dot-pending { background: var(--bg3); }
.ms-label { font-size: 12px; color: var(--text2); flex: 1; }
.ms-date  { font-size: 11px; color: var(--text3); }

/* ── Wishlist items ────────────────────────────────────────── */
.item-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.item-row:last-child { border-bottom: none; }
.item-qty  { font-size: 12px; font-weight: 600; color: var(--text3); min-width: 24px; }
.item-name { font-size: 13px; flex: 1; }
.item-cat  { font-size: 11px; font-weight: 500; padding: 2px 7px; border-radius: 99px; }
.ic-general    { background: var(--bg2); color: var(--text2); }
.ic-other      { background: var(--bg2); color: var(--text3); font-style: italic; }
.ic-furniture  { background: var(--purple-bg); color: var(--purple); }
.ic-electrical { background: var(--amber-bg); color: var(--amber); }

/* ── Payment ───────────────────────────────────────────────── */
.pay-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.pay-row:last-child { border-bottom: none; }
.pay-label { font-size: 12px; color: var(--text2); }
.pay-value { font-size: 12px; font-weight: 500; }

/* ── Notes ─────────────────────────────────────────────────── */
.notes-area {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: var(--font);
  color: var(--text);
  background: var(--bg);
  resize: vertical;
  min-height: 72px;
  outline: none;
  transition: border-color .15s;
}
.notes-area:focus { border-color: var(--accent); }
.notes-save {
  margin-top: 8px;
  font-size: 12px;
  font-weight: 500;
  padding: 6px 16px;
  background: var(--accent-bg);
  color: var(--accent);
  border: 1px solid var(--accent-border);
  border-radius: var(--radius-sm);
  transition: background .15s;
}
.notes-save:hover { background: var(--accent-hover); }

/* ── Referral number inline edit ───────────────────────────── */
.btn-edit-refnum {
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 2px 7px;
  font-size: 12px;
  color: var(--text3);
  cursor: pointer;
  line-height: 1;
  transition: all .12s;
  vertical-align: middle;
  margin-left: 5px;
}
.btn-edit-refnum { display: inline-flex; align-items: center; }
.btn-edit-refnum:hover { color: var(--accent); border-color: var(--accent); }

/* ── Edit controls ─────────────────────────────────────────── */
.btn-edit-card {
  font-size: 11px;
  color: var(--accent);
  padding: 2px 9px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  transition: all .12s;
  white-space: nowrap;
}
.btn-edit-card:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }
.btn-edit-card.active { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }

.ms-edit-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.ms-edit-row:last-of-type { border-bottom: none; }
.ms-edit-label {
  font-size: 12px;
  color: var(--text2);
  width: 130px;
  flex-shrink: 0;
}
.ms-dt-input {
  flex: 1;
  font-size: 12px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  outline: none;
  font-family: var(--font);
}
.ms-dt-input:focus { border-color: var(--accent); }
.btn-now {
  font-size: 11px;
  font-weight: 500;
  padding: 4px 9px;
  background: var(--bg2);
  color: var(--text2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  white-space: nowrap;
  transition: all .12s;
}
.btn-now:hover { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }

.vol-edit-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-top: 1px solid var(--border);
  margin-top: 2px;
}
.vol-select {
  flex: 1;
  font-size: 12px;
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  outline: none;
}
.vol-select:focus { border-color: var(--accent); }

.edit-actions {
  display: flex;
  gap: 8px;
  padding-top: 10px;
  margin-top: 2px;
  border-top: 1px solid var(--border);
}
.btn-save-edit {
  font-size: 12px;
  font-weight: 500;
  padding: 5px 16px;
  background: var(--accent);
  color: #fff;
  border-radius: var(--radius-sm);
  border: none;
  transition: opacity .12s;
}
.btn-save-edit:hover { opacity: .85; }
.btn-cancel-edit {
  font-size: 12px;
  font-weight: 500;
  padding: 5px 12px;
  background: var(--bg);
  color: var(--text2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  transition: background .12s;
}
.btn-cancel-edit:hover { background: var(--bg2); }

.pay-date-input {
  font-size: 12px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  outline: none;
  font-family: var(--font);
}
.pay-date-input:focus { border-color: var(--accent); }

/* ── Actions card ──────────────────────────────────────────── */
.action-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.action-card-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 10px;
}
.action-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-do-cancel {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border: 1px solid #F3BEBE;
  border-radius: var(--radius-sm);
  background: var(--red-bg);
  color: var(--red);
  transition: opacity .12s;
}
.btn-do-cancel:hover { opacity: .8; }
.btn-do-uncomplete {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text2);
  transition: background .12s;
}
.btn-do-uncomplete:hover { background: var(--bg2); }
.cancel-reason-area {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-family: var(--font);
  color: var(--text);
  background: var(--bg);
  resize: none;
  height: 60px;
  outline: none;
  margin-top: 8px;
  display: block;
}
.cancel-reason-area:focus { border-color: var(--red); }
.btn-do-convert {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border: 1px solid #B5CEFF;
  border-radius: var(--radius-sm);
  background: var(--blue-bg);
  color: var(--blue);
  transition: opacity .12s;
}
.btn-do-convert:hover { opacity: .8; }

.btn-confirm-cancel {
  font-size: 12px;
  font-weight: 500;
  padding: 5px 16px;
  background: var(--red);
  color: #fff;
  border-radius: var(--radius-sm);
  border: none;
  transition: opacity .12s;
}
.btn-confirm-cancel:hover { opacity: .85; }
.btn-do-delete {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--red);
  color: #fff;
  transition: opacity .12s;
  margin-top: 8px;
}
.btn-do-delete:hover { opacity: .8; }

/* ── Banner ────────────────────────────────────────────────── */
.cancelled-banner {
  background: var(--red-bg);
  border: 1px solid #F3BEBE;
  border-radius: var(--radius-sm);
  padding: 9px 14px;
  font-size: 12px;
  color: var(--red);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
}
.cancelled-banner svg { flex-shrink: 0; }

/* ── Loading ───────────────────────────────────────────────── */
.loading {
  padding: 32px;
  text-align: center;
  color: var(--text3);
  font-size: 13px;
}

/* ── Volunteers view ───────────────────────────────────────── */
.volunteers-view { flex: 1; overflow-y: auto; padding: 24px; }
.vol-view-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; max-width: 900px; }
.vol-view-header h2 { font-size: 18px; font-weight: 600; flex: 1; }
.vol-table-wrap { max-width: 900px; overflow-x: auto; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); }
.vol-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.vol-table th {
  font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase;
  letter-spacing: .07em; text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.vol-table td { padding: 9px 12px; border-bottom: 1px solid var(--bg2); vertical-align: middle; }
.vol-table tr:last-child td { border-bottom: none; }
.vol-table tbody tr { cursor: pointer; }
.vol-table tbody tr:hover { background: var(--bg); }
.vol-row-inactive { opacity: .5; }
.vol-flag { color: var(--green); }
.vol-flag-off { color: var(--text3); }
.vol-edit-form { padding: 14px 12px; background: var(--bg); cursor: default; }
.vol-edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 14px; max-width: 640px; margin-bottom: 10px; }
.vol-field label { font-size: 11px; color: var(--text3); display: block; margin-bottom: 3px; font-weight: 500; }
.vol-input, .vol-textarea {
  width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; background: var(--panel); color: var(--text); outline: none;
}
.vol-input:focus, .vol-textarea:focus { border-color: var(--accent); }
.vol-textarea { resize: vertical; min-height: 52px; }
.vol-checks { display: flex; gap: 18px; align-items: center; grid-column: 1 / -1; }
.vol-checks label { display: flex; gap: 6px; align-items: center; font-size: 13px; color: var(--text2); cursor: pointer; }
.vol-hint { font-size: 11px; color: var(--text3); margin-top: 3px; }
body.mobile .volunteers-view { padding: 14px; }
body.mobile .vol-edit-grid { grid-template-columns: 1fr; }

/* ── Mobile portrait mode (class-based, auto-detected) ─────── */
/* Prevent iOS tap-zoom on inputs */
body.mobile input,
body.mobile textarea,
body.mobile select { font-size: 16px; }

body.mobile .app-header { height: 54px; padding: 0 14px; }
body.mobile .app-logo { font-size: 16px; }
body.mobile .user-email { display: none; }
body.mobile .sign-out-btn { font-size: 13px; padding: 8px 13px; }

body.mobile .app-body { position: relative; }

/* Sidebar becomes the full-screen list */
body.mobile .sidebar {
  width: 100%; min-width: 100%; height: 100%; max-height: none;
  border-right: none; border-bottom: none;
}
body.mobile .sidebar-top { padding: 12px 14px; gap: 10px; }
body.mobile .search-input { padding: 11px 14px; }
body.mobile #sort-btn { padding: 11px 14px !important; }

/* Filters: horizontal swipe strip */
body.mobile .filter-row {
  flex-wrap: nowrap; overflow-x: auto; overflow-y: hidden;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
  margin: 0 -14px; padding: 2px 14px;
}
body.mobile .filter-row::-webkit-scrollbar { display: none; }
body.mobile .pill { font-size: 13px; padding: 7px 13px; }

/* List rows: larger touch targets */
body.mobile .ref-item { padding: 14px 16px; }
body.mobile .ref-item.selected { padding-left: 13px; }
body.mobile .ref-num, body.mobile .ref-name { font-size: 15px; }
body.mobile .ref-org, body.mobile .ref-date { font-size: 12px; }
body.mobile .tag { font-size: 11px; padding: 3px 9px; }

/* Detail: full-screen pane, shown only after a referral is opened */
body.mobile .detail { position: absolute; inset: 0; z-index: 30; display: none; }
body.mobile.showing-detail .detail { display: flex; }
body.mobile.showing-detail .sidebar { display: none; }

/* Back bar (hidden on desktop) */
.mobile-back { display: none; }
body.mobile .mobile-back {
  display: flex; align-items: center; gap: 7px; flex-shrink: 0;
  width: 100%; padding: 13px 16px;
  background: var(--panel); border: none; border-bottom: 1px solid var(--border);
  font-size: 14px; font-weight: 500; color: var(--accent);
}
body.mobile .mobile-back:active { background: var(--bg2); }

body.mobile .detail-header { flex-direction: column; gap: 12px; padding: 14px 16px; }
body.mobile .detail-header-left h2 { font-size: 19px; }
body.mobile .detail-actions { width: 100%; flex-wrap: wrap; gap: 8px; justify-content: stretch; }
body.mobile .detail-actions .btn { flex: 1 1 42%; justify-content: center; padding: 10px 12px; font-size: 13px; }
body.mobile .detail-body { padding: 14px 16px 40px; gap: 14px; }

body.mobile .stat-row { grid-template-columns: 1fr 1fr; gap: 10px; }
body.mobile .stat { padding: 12px 14px; }
body.mobile .stat span { font-size: 15px; }
body.mobile .two-col, body.mobile .three-col { grid-template-columns: 1fr; gap: 14px; }
body.mobile .card { padding: 16px; }
body.mobile .field span, body.mobile .field a { font-size: 14px; }

body.mobile .ms-edit-label { width: 110px; }
body.mobile .action-buttons { gap: 8px; }
body.mobile .action-buttons > button { flex: 1 1 42%; text-align: center; padding: 10px 12px; }

/* Login card fits small screens */
body.mobile .login-card { padding: 40px 26px; margin: 16px; }
</style>
</head>
<body>

<!-- ── Login ──────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Hidden Help Admin</div>
    <div class="login-sub">Referral management</div>
    <label class="login-label">Email address</label>
    <input id="login-email" class="login-input" type="email" placeholder="your@email.com" />
    <button id="login-btn" class="login-btn">Send magic link</button>
    <div id="otp-section" style="margin-top:14px;">
      <label class="login-label">Got a code from the email? Enter it here</label>
      <input id="otp-code" class="login-input" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="10" placeholder="12345678" />
      <button id="otp-btn" class="login-btn">Verify code</button>
    </div>
    <div id="login-msg" class="login-msg"></div>
  </div>
</div>

<!-- ── App ────────────────────────────────────────────────── -->
<div id="app">
  <header class="app-header">
    <div class="app-logo">Hidden Help Admin</div>
    <span id="user-email" class="user-email"></span>
    <button id="view-toggle-btn" class="sign-out-btn" onclick="toggleView()">Volunteers</button>
    <button id="sign-out-btn" class="sign-out-btn">Sign out</button>
  </header>
  <div class="app-body">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-top">
        <div style="display:flex;gap:6px;align-items:center;">
          <input id="search" class="search-input" type="search" placeholder="Search name, ref, org…" style="flex:1;" />
          <button id="sort-btn" title="Sort order" style="flex-shrink:0;padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);font-size:14px;line-height:1;cursor:pointer;transition:background .12s;" onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background='var(--bg)'">↓</button>
        </div>
        <div class="filter-row">
          <button class="pill" data-status="all">All</button>
          <button class="pill active" data-status="open" title="Not yet completed, cancelled or rejected">Open</button>
          <button class="pill" data-status="posted" title="Posted to Telegram and still open">Posted</button>
          <button class="pill" data-status="awaiting-wishlist">Awaiting wishlist</button>
          <button class="pill" data-status="completed">Completed</button>
          <button class="pill" data-status="cancelled">Cancelled</button>
          <button class="pill" data-status="rejected">Rejected</button>
        </div>
        <div class="filter-row">
          <button class="pill active" data-type="all">Both</button>
          <button class="pill" data-type="delivery">Delivery</button>
          <button class="pill" data-type="collection">Collection</button>
          <select id="postcode-filter" title="Filter deliveries by postcode area"></select>
        </div>
      </div>
      <div id="ref-list" class="ref-list">
        <div class="loading">Loading referrals…</div>
      </div>
    </div>

    <!-- Detail -->
    <div id="detail" class="detail">
      <div class="detail-empty">Select a referral to view details</div>
    </div>

    <!-- Volunteers -->
    <div id="volunteers-view" class="volunteers-view" style="display:none"></div>

  </div>
</div>

<script>
// ── Init ────────────────────────────────────────────────────
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: { flowType: 'implicit' }
});

let allReferrals   = [];
let selectedRef    = null;
let statusFilter   = 'open';
let typeFilter     = 'all';
let postcodeFilter = 'all';
let searchQuery    = '';
let sortAscending  = false;
const WISHLIST_FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSej2Tb1f1qxZcaiQ-Zrv77afU4nwIDL8PPO-LM-jguJPakLsQ/viewform?entry.175428476=';

let editingSection  = null;  // 'milestones' | 'payment' | null
let editingRefNum   = false;
let showCancelForm  = false;
let cancelFormType  = 'cancelled';  // 'cancelled' | 'rejected'
let showConvertForm = false;
let showWishlist    = false;
let volunteers     = [];

let currentView   = 'referrals';  // 'referrals' | 'volunteers'
let allVolunteers = [];
let editingVolId  = null;         // volunteer id | 'new' | null
let volFilter     = 'active';     // 'active' | 'all'

// ── Icons (monoline SVG, inherit button text colour) ────────
const ICONS = {
  copy:    '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="8.5" y="8.5" width="12" height="12.5" rx="2"/><path d="M16 8.5V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h2.5"/></svg>',
  check:   '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',
  list:    '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4.5" cy="6" r="1"/><circle cx="4.5" cy="12" r="1"/><circle cx="4.5" cy="18" r="1"/></svg>',
  map:     '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10.5c0 5.5-8 11-8 11s-8-5.5-8-11a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10.5" r="2.8"/></svg>',
  refresh: '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3.5v6h-6"/></svg>',
  pencil:  '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>',
  warn:    '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><line x1="12" y1="9" x2="12" y2="13.5"/><line x1="12" y1="17.5" x2="12.01" y2="17.5"/></svg>',
  send:    '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4Z"/></svg>',
  mail:    '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="4.5" width="19" height="15" rx="2"/><path d="m2.5 7 9.5 6 9.5-6"/></svg>',
  printer: '<svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V3h12v6"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="7"/></svg>',
};

// ── Auth ────────────────────────────────────────────────────
async function initAuth() {
  const { data: { session } } = await db.auth.getSession();
  if (session) showApp(session.user);
  else         showLogin();

  db.auth.onAuthStateChange((_event, session) => {
    if (session) showApp(session.user);
    else         showLogin();
  });
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').classList.remove('visible');
}

function showApp(user) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('user-email').textContent = user.email;
  loadVolunteers();
  loadReferrals();
}

document.getElementById('login-btn').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const msg   = document.getElementById('login-msg');
  const btn   = document.getElementById('login-btn');
  if (!email) { msg.textContent = 'Please enter your email address.'; msg.className = 'login-msg err'; return; }
  btn.disabled   = true;
  btn.textContent = 'Sending…';
  msg.textContent = '';
  const { error } = await db.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin + window.location.pathname }
  });
  btn.disabled   = false;
  btn.textContent = 'Send magic link';
  if (error) { msg.textContent = error.message; msg.className = 'login-msg err'; }
  else {
    msg.textContent = 'Check your email for a magic link or code.';
    msg.className   = 'login-msg ok';
    // Home Screen apps can't receive the magic-link session (link opens in
    // Safari's separate storage) — typing the code signs in inside the app
    document.getElementById('otp-code').focus();
  }
});

document.getElementById('otp-btn').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const token = document.getElementById('otp-code').value.trim();
  const msg   = document.getElementById('login-msg');
  const btn   = document.getElementById('otp-btn');
  if (!email)              { msg.textContent = 'Enter your email address above too.'; msg.className = 'login-msg err'; return; }
  if (!/^\d{6,10}$/.test(token)) { msg.textContent = 'Enter the code from the email.'; msg.className = 'login-msg err'; return; }
  btn.disabled    = true;
  btn.textContent = 'Verifying…';
  const { error } = await db.auth.verifyOtp({ email, token, type: 'email' });
  btn.disabled    = false;
  btn.textContent = 'Verify code';
  if (error) { msg.textContent = error.message; msg.className = 'login-msg err'; }
  // success: onAuthStateChange shows the app
});

document.getElementById('otp-code').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('otp-btn').click();
});

document.getElementById('login-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

document.getElementById('sign-out-btn').addEventListener('click', async () => {
  await db.auth.signOut();
});

// ── Data ────────────────────────────────────────────────────
async function loadReferrals() {
  const { data, error } = await db
    .from('referrals')
    .select(`
      *,
      clients (*),
      referrers (*),
      wishlist_items (*),
      referral_crisis_types ( crisis_types (name) ),
      gathered_vol:volunteers!gathered_by_id (name),
      delivered_vol:volunteers!delivered_by_id (name)
    `)
    .order('referral_number', { ascending: false });

  if (error) { console.error(error); return; }
  allReferrals = data || [];
  if (selectedRef) {
    const updated = allReferrals.find(x => x.id === selectedRef.id);
    if (updated) { selectedRef = updated; renderDetail(selectedRef); }
  }
  renderList();
}

async function loadVolunteers() {
  const { data } = await db.from('volunteers').select('id, name').eq('active', true).order('name');
  volunteers = data || [];
}

// ── Volunteers view ─────────────────────────────────────────
function toggleView() {
  currentView = currentView === 'referrals' ? 'volunteers' : 'referrals';
  const isVol = currentView === 'volunteers';
  document.getElementById('volunteers-view').style.display = isVol ? 'block' : 'none';
  document.querySelector('.sidebar').style.display = isVol ? 'none' : '';
  document.getElementById('detail').style.display = isVol ? 'none' : '';
  document.getElementById('view-toggle-btn').textContent = isVol ? 'Referrals' : 'Volunteers';
  if (isVol) { editingVolId = null; loadAllVolunteers(); }
}

async function loadAllVolunteers() {
  const el = document.getElementById('volunteers-view');
  if (!allVolunteers.length) el.innerHTML = '<div class="loading">Loading volunteers…</div>';
  const { data, error } = await db.from('volunteers').select('*').order('name');
  if (error) { el.innerHTML = `<div class="loading">Failed to load: ${esc(error.message)}</div>`; return; }
  allVolunteers = data || [];
  renderVolunteers();
}

// Same shapes the Apps Script ingest accepts; store E.164 like clients/referrers.
function normalisePhone(raw) {
  if (!raw) return null;
  const digits = String(raw).replace(/\D/g, '');
  if (!digits) return null;
  if (digits.startsWith('44') && digits.length === 12) return '+' + digits;
  if (digits.startsWith('0')  && digits.length === 11) return '+44' + digits.slice(1);
  if (digits.length === 10)                            return '+44' + digits;
  return digits;
}

function setVolFilter(f) {
  volFilter = f;
  renderVolunteers();
}

function volEditForm(v) {
  const isNew = !v.id;
  return `<td colspan="6" class="vol-edit-form" onclick="event.stopPropagation()">
    <div class="vol-edit-grid">
      <div class="vol-field"><label>Name</label><input class="vol-input" id="vf-name" value="${esc(v.name || '')}"></div>
      <div class="vol-field"><label>Phone</label><input class="vol-input" id="vf-phone" value="${esc(v.phone || '')}"></div>
      <div class="vol-field">
        <label>Telegram user ID</label><input class="vol-input" id="vf-tgid" inputmode="numeric" value="${esc(v.telegram_user_id ?? '')}">
        <div class="vol-hint">Numeric ID linking the volunteer to the bot — get it from @userinfobot, not the @username</div>
      </div>
      <div class="vol-field"><label>Telegram username</label><input class="vol-input" id="vf-tguser" value="${esc(v.telegram_username || '')}"></div>
      <div class="vol-field" style="grid-column:1/-1"><label>Notes</label><textarea class="vol-textarea" id="vf-notes">${esc(v.notes || '')}</textarea></div>
      <div class="vol-checks">
        <label><input type="checkbox" id="vf-drive" ${v.can_drive ? 'checked' : ''}> Can drive</label>
        <label><input type="checkbox" id="vf-gather" ${v.can_gather ? 'checked' : ''}> Can gather</label>
        <label><input type="checkbox" id="vf-active" ${v.active !== false ? 'checked' : ''}> Active</label>
      </div>
    </div>
    <div class="edit-actions">
      <button class="btn-save-edit" onclick="saveVolunteerRecord(${isNew ? 'null' : v.id})">${isNew ? 'Add volunteer' : 'Save'}</button>
      <button class="btn-cancel-edit" onclick="editingVolId=null;renderVolunteers()">Cancel</button>
    </div>
  </td>`;
}

function renderVolunteers() {
  const el = document.getElementById('volunteers-view');
  const shown = allVolunteers.filter(v => volFilter === 'all' || v.active);
  const flag = on => on ? '<span class="vol-flag">✓</span>' : '<span class="vol-flag-off">—</span>';

  const rows = shown.map(v => editingVolId === v.id
    ? `<tr>${volEditForm(v)}</tr>`
    : `<tr class="${v.active ? '' : 'vol-row-inactive'}" onclick="editingVolId=${v.id};renderVolunteers()">
        <td>${esc(v.name)}${v.active ? '' : ' <span class="tag tag-rejected">Inactive</span>'}</td>
        <td style="white-space:nowrap">${fmtPhone(v.phone)}${phoneWarn(v.phone)}</td>
        <td>${flag(v.can_drive)}</td>
        <td>${flag(v.can_gather)}</td>
        <td>${v.telegram_user_id ? `<span class="vol-flag">✓</span> ${esc(v.telegram_username ? '@' + v.telegram_username.replace(/^@/, '') : '')}` : '<span class="vol-flag-off">Not linked</span>'}</td>
        <td style="color:var(--text2);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(v.notes || '')}</td>
      </tr>`).join('');

  el.innerHTML = `
    <div class="vol-view-header">
      <h2>Volunteers</h2>
      <button class="pill${volFilter === 'active' ? ' active' : ''}" onclick="setVolFilter('active')">Active (${allVolunteers.filter(v => v.active).length})</button>
      <button class="pill${volFilter === 'all' ? ' active' : ''}" onclick="setVolFilter('all')">All (${allVolunteers.length})</button>
      <button class="btn" onclick="editingVolId='new';renderVolunteers()">+ Add volunteer</button>
    </div>
    <div class="vol-table-wrap">
      <table class="vol-table">
        <thead><tr><th>Name</th><th>Phone</th><th>Drive</th><th>Gather</th><th>Telegram</th><th>Notes</th></tr></thead>
        <tbody>
          ${editingVolId === 'new' ? `<tr>${volEditForm({})}</tr>` : ''}
          ${rows || `<tr><td colspan="6" style="color:var(--text3);text-align:center;padding:24px">No volunteers</td></tr>`}
        </tbody>
      </table>
    </div>`;
}

// NB: saveVolunteer(id, field, selectId) further down writes referral
// assignments — this one edits the volunteers table itself.
async function saveVolunteerRecord(id) {
  const name = document.getElementById('vf-name').value.trim();
  if (!name) { alert('Name is required.'); return; }
  const tgidRaw = document.getElementById('vf-tgid').value.trim();
  if (tgidRaw && !/^\d+$/.test(tgidRaw)) { alert('Telegram user ID must be numeric.'); return; }

  const payload = {
    name,
    phone: normalisePhone(document.getElementById('vf-phone').value),
    telegram_user_id: tgidRaw ? Number(tgidRaw) : null,
    telegram_username: document.getElementById('vf-tguser').value.trim().replace(/^@/, '') || null,
    notes: document.getElementById('vf-notes').value.trim() || null,
    can_drive:  document.getElementById('vf-drive').checked,
    can_gather: document.getElementById('vf-gather').checked,
    active:     document.getElementById('vf-active').checked,
  };

  const { error } = id
    ? await db.from('volunteers').update(payload).eq('id', id)
    : await db.from('volunteers').insert(payload);
  if (error) { alert('Save failed: ' + error.message); return; }

  editingVolId = null;
  await loadAllVolunteers();
  loadVolunteers();  // refresh the gathered-by/delivered-by dropdown cache
}

function deriveStatus(r) {
  if (r.cancelled_at)          return r.cancellation_type === 'rejected' ? 'rejected' : 'cancelled';
  if (r.completed_at)          return 'completed';
  if (r.gathered_at)           return 'gathered';
  if (r.wishlist_submitted_at) return 'awaiting gathering';
  if (r.received_at)           return 'awaiting wishlist';
  return 'new';
}

function crisisNames(r) {
  if (!r.referral_crisis_types) return [];
  return r.referral_crisis_types.map(rct => rct.crisis_types?.name).filter(Boolean);
}

function fmtDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: '2-digit' });
}

function fmtDateTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' })
    + ', ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function toInputDatetime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}

function toInputDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}

// ── List ────────────────────────────────────────────────────
function matchesStatusFilter(r, status) {
  const open = !['completed','cancelled','rejected'].includes(status);
  return statusFilter === 'all'    ? true
    : statusFilter === 'open'   ? open
    : statusFilter === 'posted' ? open && !!r.telegram_posted_at
    : statusFilter === 'awaiting-wishlist' ? status === 'awaiting wishlist'
    : status === statusFilter;  // completed | cancelled | rejected
}

function matchesTypeFilter(r) {
  return typeFilter === 'all' || r.fulfilment_type === typeFilter;
}

// Outward part of a UK postcode ("CV1 2AB" → "CV1"); '' if missing/unparseable.
// Inward part (digit + 2 letters) is stripped from the end so spaceless
// postcodes parse right: "CV21AB" → CV2, but bare "CV21" → CV21.
function outwardCode(pc) {
  const s = String(pc || '').toUpperCase().replace(/\s+/g, '');
  const m = s.match(/^([A-Z]{1,2}\d[A-Z\d]?)(\d[A-Z]{2})?$/);
  return m ? m[1] : '';
}

// Deliveries only: a specific postcode selection hides collections
function matchesPostcodeFilter(r) {
  if (postcodeFilter === 'all') return true;
  if (r.fulfilment_type !== 'delivery') return false;
  return outwardCode(r.clients?.postcode) === postcodeFilter;
}

function filterReferrals() {
  const filtered = allReferrals.filter(r => {
    const status = deriveStatus(r);
    const q = searchQuery.toLowerCase();

    // searching bypasses the filters so a search always finds the referral
    if (q) return [
      String(r.referral_number),
      r.clients?.first_name, r.clients?.last_name,
      r.referrers?.name, r.referrers?.organisation,
      r.clients?.postcode,
      r.clients?.address, r.clients?.geocoded_address,
    ].filter(Boolean).some(v => v.toLowerCase().includes(q));

    return matchesStatusFilter(r, status) && matchesTypeFilter(r) && matchesPostcodeFilter(r);
  });
  return filtered.sort((a, b) => {
    const diff = a.referral_number - b.referral_number;
    return sortAscending ? diff : -diff;
  });
}

function renderList() {
  updatePillCounts();
  const list    = document.getElementById('ref-list');
  const visible = filterReferrals();
  if (!visible.length) {
    list.innerHTML = '<div class="ref-list-empty">No referrals found</div>';
    return;
  }
  list.innerHTML = visible.map(r => {
    const status  = deriveStatus(r);
    const name    = clientName(r.clients);
    const org     = r.referrers?.organisation || r.referrers?.name || '';
    const isSelected = selectedRef?.referral_number === r.referral_number;
    return `
      <div class="ref-item${isSelected ? ' selected' : ''}" data-ref="${r.referral_number}">
        <div class="ref-item-top">
          <div class="ref-id-tags">
            <span class="ref-num">#${r.referral_number}</span>
            <span class="tag tag-${r.fulfilment_type}">${r.fulfilment_type.charAt(0).toUpperCase() + r.fulfilment_type.slice(1)}</span>
            <span class="tag tag-${statusKey(status)}">${statusLabel(status)}</span>
          </div>
          <span class="ref-date">${fmtDate(r.received_at || r.created_at)}</span>
        </div>
        <div class="ref-name">${esc(name)}</div>
        ${org ? `<div class="ref-org">${esc(org)}</div>` : ''}
      </div>`;
  }).join('');

  list.querySelectorAll('.ref-item').forEach(el => {
    el.addEventListener('click', () => {
      const r = allReferrals.find(x => x.referral_number === Number(el.dataset.ref));
      selectReferral(r);
    });
  });
}

function statusKey(s) {
  return { 'completed': 'completed', 'cancelled': 'cancelled', 'rejected': 'rejected', 'gathered': 'gathered',
           'awaiting gathering': 'gathered', 'awaiting wishlist': 'wishlist', 'new': 'new' }[s] || 'new';
}
function statusLabel(s) {
  return { 'completed': 'Completed', 'cancelled': 'Cancelled', 'rejected': 'Rejected', 'gathered': 'Gathered',
           'awaiting gathering': 'Awaiting gathering', 'awaiting wishlist': 'Awaiting wishlist', 'new': 'New' }[s] || s;
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function titleCase(s) {
  return String(s).trim().replace(/\S+/g, w => w[0].toUpperCase() + w.slice(1).toLowerCase());
}
function clientName(c) {
  return [c?.first_name, c?.last_name].filter(Boolean).map(titleCase).join(' ') || '—';
}

// Geocoder addresses arrive as "1, JAKES LANE, CHACEWATER, TRURO, TR4 8UF" —
// join a bare house number onto the street, title-case, keep the postcode as-is.
function fmtAddress(addr) {
  const parts = String(addr).split(', ').filter(Boolean);
  if (parts.length > 1 && /^\d+[A-Za-z]?$/.test(parts[0].trim())) {
    parts.splice(0, 2, parts[0].trim() + ' ' + parts[1]);
  }
  return parts.map(p =>
    /^[A-Z]{1,2}\d[A-Z\d]?\s*\d[A-Z]{2}$/i.test(p.trim()) ? p.trim().toUpperCase() : titleCase(p).replace(/\b(\d+[a-z])\b/g, m => m.toUpperCase())
  );
}

function fmtPhone(s) {
  if (!s) return '';
  // Convert +447... → 07...
  const n = String(s).replace(/^\+44/, '0');
  return esc(n);
}

// Referrers sometimes give their own number as the client contact (rather than
// leaving it blank as the form asks) — compare last 10 digits so +44/0 agree.
function isReferrerPhone(clientPhone, refPhone) {
  const d = s => String(s || '').replace(/\D/g, '').slice(-10);
  return !!clientPhone && !!refPhone && d(clientPhone) === d(refPhone);
}

// Warning span for display only — fmtPhone also feeds plain-text emails.
// freeText: field may hold non-phone text; only assess it if it contains
// enough digits to look like an attempted phone number.
function phoneWarn(s, freeText) {
  if (!s) return '';
  const d = String(s).replace(/\D/g, '');
  if (freeText && d.length < 7) return '';
  const ok = (d.length === 11 && d[0] === '0') ||
             (d.length === 12 && d.startsWith('44') && d[2] !== '0');
  return ok ? '' : ` <span class="phone-warn">${ICONS.warn}Invalid number: please check</span>`;
}

// ── Pill counts ─────────────────────────────────────────────
function updatePillCounts() {
  // Faceted: each row's counts respect the other row's selection, so the
  // selected pills' counts are the intersection shown in the list.
  const statusCounts = { all: 0, open: 0, posted: 0, 'awaiting-wishlist': 0,
                         completed: 0, cancelled: 0, rejected: 0 };
  const typeCounts   = { all: 0, delivery: 0, collection: 0 };
  allReferrals.forEach(r => {
    const status = deriveStatus(r);
    const open = !['completed','cancelled','rejected'].includes(status);
    if (matchesTypeFilter(r) && matchesPostcodeFilter(r)) {
      statusCounts.all++;
      if (open) statusCounts.open++;
      if (open && r.telegram_posted_at) statusCounts.posted++;
      if (status === 'awaiting wishlist') statusCounts['awaiting-wishlist']++;
      if (status in statusCounts && !open) statusCounts[status]++;
    }
    if (matchesStatusFilter(r, status) && matchesPostcodeFilter(r)) {
      typeCounts.all++;
      if (r.fulfilment_type in typeCounts) typeCounts[r.fulfilment_type]++;
    }
  });
  updatePostcodeOptions();
  document.querySelectorAll('.pill[data-status], .pill[data-type]').forEach(btn => {
    const n = btn.dataset.status ? statusCounts[btn.dataset.status] : typeCounts[btn.dataset.type];
    const label = btn.dataset.label || btn.firstChild.textContent.trim();
    btn.dataset.label = label;  // cache on first run
    btn.innerHTML = label + `<span class="pill-sep">:</span><span class="pill-count">${n}</span>`;
  });
}

// Postcode dropdown: options from all deliveries, counts faceted by status
function updatePostcodeOptions() {
  const sel = document.getElementById('postcode-filter');
  const counts = new Map();
  allReferrals.forEach(r => {
    if (r.fulfilment_type !== 'delivery') return;
    const code = outwardCode(r.clients?.postcode);
    if (!counts.has(code)) counts.set(code, 0);
    if (matchesStatusFilter(r, deriveStatus(r))) counts.set(code, counts.get(code) + 1);
  });
  const codes = [...counts.keys()].filter(Boolean).sort();
  const opt = (v, label) => `<option value="${v}">${label} (${counts.get(v) || 0})</option>`;
  sel.innerHTML = '<option value="all">All areas</option>'
    + codes.map(c => opt(c, c)).join('')
    + (counts.has('') ? opt('', 'No postcode') : '');
  sel.value = [...sel.options].some(o => o.value === postcodeFilter) ? postcodeFilter : 'all';
  postcodeFilter = sel.value;
  sel.classList.toggle('active', postcodeFilter !== 'all');
}

document.getElementById('postcode-filter').addEventListener('change', e => {
  postcodeFilter = e.target.value;
  renderList();
});

// ── Filters ─────────────────────────────────────────────────
// Two independent axes: status and fulfilment type, exclusive within each row
for (const axis of ['status', 'type']) {
  document.querySelectorAll(`.pill[data-${axis}]`).forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll(`.pill[data-${axis}]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (axis === 'status') statusFilter = btn.dataset.status;
      else                   typeFilter   = btn.dataset.type;
      renderList();
    });
  });
}

document.getElementById('sort-btn').addEventListener('click', () => {
  sortAscending = !sortAscending;
  document.getElementById('sort-btn').textContent = sortAscending ? '↑' : '↓';
  renderList();
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;

});

// ── Detail ──────────────────────────────────────────────────
function hasUnsavedChanges() {
  if (!selectedRef) return false;
  if (editingSection) return true;
  if (editingRefNum)  return true;
  const notes = document.getElementById('notes-area');
  if (notes && notes.value !== (selectedRef.notes || '')) return true;
  const reason = document.getElementById('cancel-reason');
  if (reason && reason.value.trim()) return true;
  const addr = document.getElementById('convert-address');
  if (addr && addr.value.trim()) return true;
  return false;
}

function confirmDiscard() {
  return !hasUnsavedChanges() || confirm('You have unsaved changes — discard them?');
}

window.addEventListener('beforeunload', e => {
  if (hasUnsavedChanges()) { e.preventDefault(); e.returnValue = ''; }
});

function selectReferral(r) {
  if (r === selectedRef) return;
  if (!confirmDiscard()) return;
  selectedRef     = r;
  editingSection  = null;
  editingRefNum   = false;
  showCancelForm  = false;
  showConvertForm = false;
  showWishlist    = false;
  renderList();
  renderDetail(r);
  if (document.body.classList.contains('mobile')) {
    document.body.classList.add('showing-detail');
    const body = document.querySelector('#detail .detail-body');
    if (body) body.scrollTop = 0;
  }
}

function formatChildAges(ages) {
  if (!ages || !Object.keys(ages).length) return '';
  const labels = { under_1:'<1', boy_1_3:'Boy 1–3', girl_1_3:'Girl 1–3',
    boy_4_7:'Boy 4–7', girl_4_7:'Girl 4–7', boy_8_11:'Boy 8–11',
    girl_8_11:'Girl 8–11', boy_12_plus:'Boy 12+', girl_12_plus:'Girl 12+' };
  const parts = Object.entries(ages)
    .filter(([,v]) => v > 0)
    .map(([k,v]) => `${labels[k]||k}${v>1?' ×'+v:''}`);
  if (!parts.length) return '';
  return `<div class="field"><label>Children</label><span>${parts.join(', ')}</span></div>`;
}

// ── Edit helpers ────────────────────────────────────────────
function toggleEdit(section) {
  editingSection = editingSection === section ? null : section;
  showCancelForm = false;
  renderDetail(selectedRef);
}

function toggleCancelForm(type = 'cancelled') {
  showCancelForm  = !showCancelForm;
  cancelFormType  = type;
  showConvertForm = false;
  renderDetail(selectedRef);
  if (showCancelForm) scrollActionsIntoView();
}

function toggleWishlist() {
  showWishlist = !showWishlist;
  renderDetail(selectedRef);
  const card = document.getElementById('wishlist-card');
  if (card) card.scrollIntoView({ block: 'start' });
}

function toggleConvertForm() {
  showConvertForm = !showConvertForm;
  showCancelForm  = false;
  renderDetail(selectedRef);
  if (showConvertForm) scrollActionsIntoView();
}

function toggleEditRefNum() {
  editingRefNum = !editingRefNum;
  renderDetail(selectedRef);
  if (editingRefNum) setTimeout(() => document.getElementById('ref-num-input')?.select(), 0);
}

async function saveRefNum(id) {
  const input = document.getElementById('ref-num-input');
  if (!input) return;
  const newNum = parseInt(input.value, 10);
  if (!newNum || newNum < 1 || newNum > 99999) { alert('Enter a valid referral number (1–99999)'); return; }
  if (newNum === selectedRef?.referral_number) { toggleEditRefNum(); return; }
  const clash = allReferrals.find(x => x.referral_number === newNum && x.id !== id);
  if (clash) {
    const clashName = clientName(clash.clients);
    alert(`Referral number ${newNum} is already assigned to ${clashName}. Choose a different number.`);
    return;
  }
  if (!confirm(`Change referral number to ${newNum}?`)) return;
  editingRefNum = false;
  await patchReferral(id, { referral_number: newNum });
}

function scrollActionsIntoView() {
  const card = document.querySelector('#detail .action-card');
  if (card) card.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function fillMsNow(field) {
  const el = document.getElementById('ms-' + field);
  if (el) el.value = toInputDatetime(new Date().toISOString());
}

async function patchReferral(id, fields) {
  const { error } = await db.from('referrals').update(fields).eq('id', id);
  if (error) { console.error('Patch error:', error); alert('Save failed: ' + error.message); return false; }
  const idx = allReferrals.findIndex(x => x.id === id);
  if (idx >= 0) {
    Object.assign(allReferrals[idx], fields);
    selectedRef = allReferrals[idx];
  }
  renderList();
  renderDetail(selectedRef);
  return true;
}

async function saveMilestones(id) {
  const r = allReferrals.find(x => x.id === id);
  const fields = ['received_at','wishlist_submitted_at','client_contacted_at','gathered_at','completed_at'];
  const update = {};
  for (const f of fields) {
    const el = document.getElementById('ms-' + f);
    if (!el) continue;
    update[f] = el.value ? new Date(el.value).toISOString() : null;
  }
  if (update.completed_at && r?.cancelled_at) {
    alert('Cannot mark as completed while the referral is cancelled — uncancel it first.');
    return;
  }
  editingSection = null;
  await patchReferral(id, update);
}

async function saveVolunteer(id, field, selectId) {
  const val = document.getElementById(selectId)?.value;
  const parsed = val ? (isNaN(val) ? val : Number(val)) : null;
  // Update joined name before patching so renderDetail sees it immediately
  const volName = volunteers.find(v => String(v.id) === String(val))?.name || null;
  const joinField = field === 'gathered_by_id' ? 'gathered_vol' : 'delivered_vol';
  const r = allReferrals.find(x => x.id === id);
  if (r) r[joinField] = volName ? { name: volName } : null;
  await patchReferral(id, { [field]: parsed });
}

async function savePayment(id) {
  const sent      = document.getElementById('pay-sent-input')?.value;
  const recv      = document.getElementById('pay-recv-input')?.value;
  const recipient = document.getElementById('pay-recipient-input')?.value || null;
  const method    = document.getElementById('pay-method-input')?.value || null;
  editingSection  = null;
  await patchReferral(id, {
    payment_recipient:   recipient,
    payment_method:      method,
    payment_sent_at:     sent ? new Date(sent).toISOString() : null,
    payment_received_at: recv ? new Date(recv).toISOString() : null,
  });
}

async function cancelReferral(id) {
  const reason = document.getElementById('cancel-reason')?.value?.trim() || null;
  const type   = cancelFormType;
  showCancelForm = false;
  await patchReferral(id, {
    cancelled_at:        new Date().toISOString(),
    cancellation_reason: reason,
    cancellation_type:   type,
    completed_at:        null,
  });
}

async function patchClient(clientId, fields) {
  const { error } = await db.from('clients').update(fields).eq('id', clientId);
  if (error) { console.error('Client patch error:', error); alert('Save failed: ' + error.message); return; }
  allReferrals.forEach(r => {
    if (r.clients?.id === clientId) Object.assign(r.clients, fields);
  });
}

async function convertToDelivery(referralId, clientId) {
  const address   = document.getElementById('convert-address')?.value?.trim() || null;
  const recipient = document.getElementById('convert-pay-recipient')?.value || null;
  const method    = document.getElementById('convert-pay-method')?.value || null;
  if (address) await patchClient(clientId, { address });
  const fields = { fulfilment_type: 'delivery' };
  if (recipient) fields.payment_recipient = recipient;
  if (method)    fields.payment_method    = method;
  showConvertForm = false;
  await patchReferral(referralId, fields);
}

async function uncompleteReferral(id) {
  await patchReferral(id, {
    completed_at:        null,
    cancelled_at:        null,
    cancellation_reason: null,
    cancellation_type:   null,
  });
}

async function deleteReferral(id) {
  const r = allReferrals.find(x => x.id === id);
  if (!r) return;
  if (!r.cancelled_at) { alert('Only cancelled or rejected referrals can be deleted.'); return; }
  const name = clientName(r.clients);
  const rn   = r.referral_number;
  if (!confirm(`Permanently delete referral #${rn} (${name})?\n\nThis will remove all associated wishlist items and cannot be undone.`)) return;
  // Delete child rows first (no cascade on these FKs)
  await db.from('referral_crisis_types').delete().eq('referral_id', id);
  await db.from('wishlist_items').delete().eq('referral_id', id);
  await db.from('wishlist_raw').delete().eq('referral_id', id);
  const { error } = await db.from('referrals').delete().eq('id', id);
  if (error) { alert('Delete failed: ' + error.message); return; }
  allReferrals = allReferrals.filter(x => x.id !== id);
  selectedRef  = null;
  document.getElementById('detail').innerHTML = '';
  renderList();
}

// ── Notes ───────────────────────────────────────────────────
async function saveNotes(referralId) {
  const text = document.getElementById('notes-area')?.value || '';
  const btn  = document.getElementById('notes-save-btn');
  const { error } = await db.from('referrals').update({ notes: text }).eq('id', referralId);
  if (error) {
    console.error('Notes save error:', error);
    flashButton(btn, '✕ Save failed', 'var(--red)', 'Save note');
    return;
  }
  const r = allReferrals.find(x => x.id === referralId);
  if (r) r.notes = text;
  flashButton(btn, '✓ Saved', 'var(--green)', 'Save note');
}

function flashButton(btn, text, color, originalText) {
  if (!btn) return;
  btn.textContent = text;
  btn.style.background = color;
  setTimeout(() => {
    btn.textContent = originalText;
    btn.style.background = '';
  }, 2000);
}

function copyWishlistUrl(referralNumber) {

  navigator.clipboard.writeText(url).then(() => {

function flashIconBtn(btn, icon, label, restoreIcon, restoreLabel) {
  if (!btn) return;
  btn.innerHTML = icon + `<span>${label}</span>`;
  setTimeout(() => { btn.innerHTML = restoreIcon + `<span>${restoreLabel}</span>`; }, 2000);

// mirrors the post-to-telegram edge function's household line
function buildHousehold(adultsCount, adultsBySex, childAges) {
  const parts = [];
  if (adultsBySex?.male)   parts.push(`${adultsBySex.male} x Adults Male`);
  if (adultsBySex?.female) parts.push(`${adultsBySex.female} x Adults Female`);
  if (!adultsBySex?.male && !adultsBySex?.female && adultsCount) parts.push(`${adultsCount} x Adults`);
  const labels = {
    under_1: 'Under 1', boy_1_3: 'Boy 1-3', girl_1_3: 'Girl 1-3',
    boy_4_7: 'Boy 4-7', girl_4_7: 'Girl 4-7', boy_8_11: 'Boy 8-11',
    girl_8_11: 'Girl 8-11', boy_12_plus: 'Boy 12+', girl_12_plus: 'Girl 12+',
  };
  if (childAges) {
    for (const [k, v] of Object.entries(childAges)) {
      if (v > 0) parts.push(`${v} x ${labels[k] || k}`);
    }
  }
  return parts.join(', ');
}

// PDF is generated server-side by the post-to-telegram edge function
// with mode:'pdf', so Telegram, PDF and Email all share one generator
async function fetchPdfBlob(r) {
  const { data: { session } } = await db.auth.getSession();
  const res = await fetch(`${SUPABASE_URL}/functions/v1/post-to-telegram`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${session.access_token}`,
    },
    body: JSON.stringify({ referral_number: r.referral_number, mode: 'pdf' }),
  });
  if (!res.ok) {
    let msg = `HTTP ${res.status}`;
    try { msg = (await res.json()).error || msg; } catch (_) {}
    throw new Error(msg);
  }
  return res.blob();
}

function buildEmailText(r) {
  const c = r.clients || {};
  const ref = r.referrers || {};
  const isDelivery = r.fulfilment_type === 'delivery';
  const name = [c.first_name, c.last_name].filter(Boolean).join(' ');
  const phone = isReferrerPhone(c.phone, ref.phone) ? 'contact referrer' : fmtPhone(c.phone);
  const address = isDelivery
    ? (c.geocoded_address || c.address || '')
    : (r.notes ? `Needed asap. Please contact to arrange: ${r.notes}` : 'Needed asap. Please contact to arrange.');
  const refPhone = fmtPhone(ref.phone);
  const refDetail = [refPhone, ref.organisation].filter(Boolean).join(', ');
  const household = buildHousehold(r.adults_count, r.adults_by_sex, r.child_ages);

  const lines = [
    isDelivery ? 'Delivery' : 'Collection',
    `${r.referral_number} — ${name} (${phone})`,
    address,
  ];
  if (c.client_secondary_contact) lines.push(`Second contact: ${c.client_secondary_contact}`);
  lines.push(`Referrer: ${ref.name || ''}${refDetail ? ` (${refDetail})` : ''}`);
  if (isDelivery && r.notes) lines.push(`Notes: ${r.notes}`);
  lines.push(`Household: ${household}`);
  lines.push('', 'PDF attached.');

  return lines.join('\n');
}

async function postWishlistTelegram() {
  const r = selectedRef; if (!r) return;
  if (r.telegram_posted_at && !confirm(`Already posted to Telegram ${fmtDateTime(r.telegram_posted_at)}.\n\nPost again?`)) return;
  const btn = document.getElementById('wl-tg-btn');
  btn.disabled = true;
  try {
    const { data: { session } } = await db.auth.getSession();
    const res = await fetch(`${SUPABASE_URL}/functions/v1/post-to-telegram`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${session.access_token}`,
      },
      body: JSON.stringify({ referral_number: r.referral_number }),
    });
    const body = await res.json();
    if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
    // edge function stamps telegram_posted_at server-side; mirror it locally
    r.telegram_posted_at = new Date().toISOString();
    renderList();
    renderDetail(r);
  } catch (e) {
    flashIconBtn(btn, ICONS.warn, 'Failed', ICONS.send, 'Telegram');
    alert('Telegram post failed: ' + e.message);
    btn.disabled = false;
  }
}

async function draftWishlistEmail() {
  const r = selectedRef; if (!r) return;
  const btn = document.getElementById('wl-email-btn');
  btn.disabled = true;
  try {
    const blob     = await fetchPdfBlob(r);
    const blobUrl  = URL.createObjectURL(blob);
    const filename = `Referral ${r.referral_number}.pdf`;

    // Trigger PDF download
    const a = document.createElement('a');
    a.href = blobUrl; a.download = filename; a.click();
    setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);

    // Open Gmail compose in new tab
    const subject = `*** REFERRAL ${r.referral_number} ***`;
    const gmailUrl = 'https://mail.google.com/mail/?view=cm&fs=1'
      + `&to=${encodeURIComponent(REFERRAL_EMAIL_RECIPIENT)}`
      + `&su=${encodeURIComponent(subject)}`
      + `&body=${encodeURIComponent(buildEmailText(r))}`;
    window.open(gmailUrl, '_blank');

    // "drafted", not "sent" — we can't see whether the Gmail draft goes out
    const ts = new Date().toISOString();
    const { error } = await db.from('referrals').update({ email_drafted_at: ts }).eq('id', r.id);
    if (error) console.error('email_drafted_at stamp failed:', error);
    else r.email_drafted_at = ts;
    renderDetail(r);
  } catch (e) {
    flashIconBtn(btn, ICONS.warn, 'Failed', ICONS.mail, 'Email');
    alert('Email draft failed: ' + e.message);
    btn.disabled = false;
  }
}

async function openWishlistPdf() {
  const r = selectedRef; if (!r) return;
  const btn = document.getElementById('wl-pdf-btn');
  btn.disabled = true;
  flashIconBtn(btn, ICONS.printer, 'Generating…', ICONS.printer, 'PDF');
  try {
    const blob = await fetchPdfBlob(r);
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 30000);
  } catch (e) {
    alert('PDF generation failed: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

// ── Refresh ─────────────────────────────────────────────────
async function refreshSelected() {
  if (!confirmDiscard()) return;
  editingSection  = null;
  showCancelForm  = false;
  showConvertForm = false;
  await loadReferrals();
}

// ── Mobile portrait mode ────────────────────────────────────
function isMobileViewport() {
  return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
    || window.matchMedia('(max-width: 768px)').matches
    || /[?&]mobile\b/.test(location.search);   // manual override for testing
}
function applyMobileMode() {
  const on = isMobileViewport();
  document.body.classList.toggle('mobile', on);
  if (!on) document.body.classList.remove('showing-detail');
}
function mobileBackToList() {
  if (!confirmDiscard()) return;
  editingSection = null; showCancelForm = false; showConvertForm = false;
  document.body.classList.remove('showing-detail');
  if (selectedRef) renderDetail(selectedRef);
}
applyMobileMode();
let _mobResizeT;
window.addEventListener('resize', () => { clearTimeout(_mobResizeT); _mobResizeT = setTimeout(applyMobileMode, 150); });

// ── Boot ────────────────────────────────────────────────────
initAuth();
</script>
