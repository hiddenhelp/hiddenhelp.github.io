<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Help Message</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 24px 20px;
            min-height: 100vh;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .ref {
            font-size: 13px;
            color: var(--tg-theme-hint-color, #888);
            margin-bottom: 4px;
        }
        .client {
            font-size: 20px;
            font-weight: 600;
        }
        .message-label {
            font-size: 13px;
            color: var(--tg-theme-hint-color, #888);
            margin-bottom: 8px;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            font-size: 15px;
            line-height: 1.5;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--tg-theme-text-color, #000000);
            resize: vertical;
            outline: none;
            font-family: inherit;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            margin-bottom: 12px;
        }
        .btn-primary {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
        .btn-primary:active { opacity: 0.8; }
        .error {
            text-align: center;
            padding: 40px 20px;
            font-size: 15px;
            color: #cc0000;
        }
    </style>
</head>
<body>

    <div id="error-section" class="error" style="display:none"></div>

    <div id="main" style="display:none">
        <div class="card">
            <div class="ref" id="ref-label"></div>
            <div class="client" id="client-name"></div>
        </div>
        <div class="card">
            <div class="message-label">SMS message to client</div>
            <textarea id="sms-body"></textarea>
        </div>
        <button class="btn btn-primary" onclick="sendSms()">📱 Send SMS to client</button>
    </div>

    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
        }

        const params = new URLSearchParams(window.location.search);
        const ref    = params.get('ref') || '';
        const client = params.get('client') || 'Client';
        const number = params.get('number');

        if (!number) {
            document.getElementById('error-section').style.display = 'block';
            document.getElementById('error-section').textContent   = '⚠️ Missing phone number.';
        } else {
            document.getElementById('ref-label').textContent   = ref ? 'Ref ' + ref : '';
            document.getElementById('client-name').textContent = client;
            document.getElementById('sms-body').value          = `Hi ${client}, this is Hidden Help `;
            document.getElementById('main').style.display      = 'block';

            // Place cursor at end of textarea
            const ta = document.getElementById('sms-body');
            ta.focus();
            ta.setSelectionRange(ta.value.length, ta.value.length);
        }

        function sendSms() {
            const body = document.getElementById('sms-body').value.trim();
            if (!body) return;
            window.location.href = `sms:${number}&body=${encodeURIComponent(body)}`;
        }
    </script>
</body>
</html>
