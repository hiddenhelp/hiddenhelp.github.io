<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hidden Help</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ── Tokens (match Admin UI / volunteer app) ── */
        :root {
            --bg:#F4F5F1; --bg2:#EAECE5; --bg3:#DFE2D9; --panel:#FFFFFF; --border:#D6DACF;
            --text:#181A17; --text2:#535A51; --text3:#929A8F;
            --accent:#2E6B4E; --accent-bg:#E8EEEB; --accent-border:#A9CBB6;
            --red:#9B2020;
            --radius:8px; --radius-sm:5px;
            --shadow:0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
            --font:'Sora', sans-serif;
        }
        *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
        html,body { font-family:var(--font); font-size:15px; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }
        body { padding:16px 16px calc(24px + env(safe-area-inset-bottom)); max-width:640px; margin:0 auto; }
        button { font-family:var(--font); cursor:pointer; border:none; background:none; }
        a { color:inherit; text-decoration:none; }

        .header { margin-bottom:20px; }
        .header-ref { font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--text3); font-weight:600; margin-bottom:3px; }
        .header-name { font-size:22px; font-weight:600; }
        .header-number { font-size:14px; color:var(--text2); margin-top:3px; }

        .option { display:flex; align-items:center; gap:14px; background:var(--panel); border:1px solid var(--border); box-shadow:var(--shadow); border-radius:var(--radius); padding:16px; width:100%; text-align:left; margin-bottom:12px; color:var(--text); }
        .option:active { background:var(--bg2); }
        .option-icon { flex-shrink:0; width:40px; height:40px; border-radius:10px; background:var(--accent-bg); color:var(--accent); display:flex; align-items:center; justify-content:center; }
        .option-icon svg { width:22px; height:22px; }
        .option-title { font-size:16px; font-weight:600; margin-bottom:2px; }
        .option-desc { font-size:13px; color:var(--text2); line-height:1.35; }

        .screen { display:none; }
        .screen.active { display:block; }

        .back-btn { color:var(--accent); font-size:15px; font-weight:500; padding:0 0 16px; display:flex; align-items:center; gap:4px; }

        .card { background:var(--panel); border:1px solid var(--border); box-shadow:var(--shadow); border-radius:var(--radius); padding:16px; margin-bottom:14px; }
        .card-label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; font-weight:600; margin-bottom:8px; }
        .card-text { font-size:15px; line-height:1.5; }
        .card-meta { font-size:13px; color:var(--text2); margin-top:6px; }

        .eta-time { font-size:38px; font-weight:600; color:var(--accent); margin-bottom:2px; }
        .eta-mins { font-size:14px; color:var(--text2); }

        .btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:14px; border-radius:var(--radius); font-size:15px; font-weight:600; text-align:center; margin-bottom:10px; border:1px solid transparent; }
        .btn svg { width:18px; height:18px; }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-primary:active { opacity:.85; }
        .btn-secondary { background:var(--panel); color:var(--text); border-color:var(--border); }

        .status { text-align:center; padding:40px 10px; font-size:15px; color:var(--text2); }
        .status-icon { display:flex; justify-content:center; margin-bottom:14px; color:var(--accent); }
        .status-icon.warn { color:var(--red); }
        .status-icon svg { width:40px; height:40px; }
        .error-text { color:var(--red); }
    </style>
</head>
<body>

    <!-- ── SCREEN: main menu ── -->
    <div id="screen-main" class="screen active">
        <div class="header">
            <div class="header-ref" id="hdr-ref"></div>
            <div class="header-name" id="hdr-name"></div>
            <div class="header-number" id="hdr-number"></div>
        </div>

        <button class="option" onclick="show('screen-message')">
            <div class="option-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2Z"/></svg></div>
            <div>
                <div class="option-title">Send a message</div>
                <div class="option-desc">Open messaging app — type your own</div>
            </div>
        </button>

        <button class="option" onclick="show('screen-avail')">
            <div class="option-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 2.5-3 4"/><path d="M12 17h.01"/></svg></div>
            <div>
                <div class="option-title">Check availability</div>
                <div class="option-desc" id="avail-desc"></div>
            </div>
        </button>

        <button class="option" onclick="startETA()">
            <div class="option-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
            <div>
                <div class="option-title">Send ETA</div>
                <div class="option-desc">Calculate your arrival time and text them</div>
            </div>
        </button>
    </div>

    <!-- ── SCREEN: bare message ── -->
    <div id="screen-message" class="screen">
        <button class="back-btn" onclick="show('screen-main')">‹ Back</button>
        <div class="card">
            <div class="card-label">Messaging app will open for</div>
            <div class="card-text" id="msg-name-display"></div>
            <div class="card-meta" id="msg-number-display"></div>
        </div>
        <a id="bare-sms-btn" href="#" class="btn btn-primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2Z"/></svg> Open messaging app</a>
    </div>

    <!-- ── SCREEN: availability ── -->
    <div id="screen-avail" class="screen">
        <button class="back-btn" onclick="show('screen-main')">‹ Back</button>
        <div class="card">
            <div class="card-label">Message preview</div>
            <div class="card-text" id="avail-message"></div>
        </div>
        <a id="avail-sms-btn" href="#" class="btn btn-primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2Z"/></svg> Send via messaging app</a>
    </div>

    <!-- ── SCREEN: ETA (loading) ── -->
    <div id="screen-eta-loading" class="screen">
        <button class="back-btn" onclick="show('screen-main')">‹ Back</button>
        <div class="status">
            <div class="status-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="2.5"/></svg></div>
            <div>Getting your location…</div>
        </div>
    </div>

    <!-- ── SCREEN: ETA (error) ── -->
    <div id="screen-eta-error" class="screen">
        <button class="back-btn" onclick="show('screen-main')">‹ Back</button>
        <div class="status">
            <div class="status-icon warn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg></div>
            <div id="eta-error-msg" class="error-text"></div>
        </div>
        <button class="btn btn-secondary" onclick="startETA()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v6h-6"/></svg> Try again</button>
    </div>

    <!-- ── SCREEN: ETA (result) ── -->
    <div id="screen-eta-result" class="screen">
        <button class="back-btn" onclick="show('screen-main')">‹ Back</button>
        <div class="card">
            <div class="card-label" id="eta-ref-label"></div>
            <div class="card-text" id="eta-name-label"></div>
            <div style="margin-top: 14px;">
                <div class="card-label">Estimated arrival</div>
                <div class="eta-time" id="eta-time"></div>
                <div class="eta-mins" id="eta-mins"></div>
            </div>
        </div>
        <div class="card">
            <div class="card-label">Message preview</div>
            <div class="card-text" id="eta-message"></div>
        </div>
        <a id="eta-sms-btn" href="#" class="btn btn-primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2Z"/></svg> Send via messaging app</a>
        <button class="btn btn-secondary" onclick="startETA()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v6h-6"/></svg> Recalculate ETA</button>
    </div>

    <!-- ── SCREEN: param error ── -->
    <div id="screen-param-error" class="screen">
        <div class="status">
            <div class="status-icon warn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg></div>
            <div class="error-text">Missing parameters. Please use the button in the bot.</div>
        </div>
    </div>

    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
            // Only when reached from another page (e.g. the volunteer app) — leaves
            // the standalone bot flow, where this is the entry page, unchanged.
            if (window.history.length > 1) {
                Telegram.WebApp.BackButton.show();
                Telegram.WebApp.BackButton.onClick(() => history.back());
            }
        }

        // Telegram Mini App webview ignores tel:/sms: anchor taps — route via window.open
        document.addEventListener('click', e => {
            const a = e.target.closest('a[href^="tel:"], a[href^="sms:"]');
            if (a) { e.preventDefault(); window.open(a.href, '_blank'); }
        });

        // ── parse URL params ──────────────────────────────────────────────
        const params  = new URLSearchParams(window.location.search);
        const mode    = (params.get('mode') || 'delivery').toLowerCase();
        const ref     = params.get('ref')    || params.get('code') || '';
        const name    = params.get('name')   || '';
        const number  = params.get('number') || '';
        const destLat = parseFloat(params.get('lat'));
        const destLon = parseFloat(params.get('lon'));

        const firstName = name.split(' ')[0] || name;
        const isDelivery = mode === 'delivery';
        const contactLabel = isDelivery ? 'client' : 'donor';
        const refLabel     = isDelivery ? 'Ref' : 'Code';

        // ── validate ─────────────────────────────────────────────────────
        if (!number || isNaN(destLat) || isNaN(destLon)) {
            show('screen-param-error');
        } else {
            init();
        }

        function init() {
            // header
            document.getElementById('hdr-ref').textContent    = ref ? `${refLabel} ${ref}` : '';
            document.getElementById('hdr-name').textContent   = name;
            document.getElementById('hdr-number').textContent = number;

            // availability description
            document.getElementById('avail-desc').textContent = isDelivery
                ? 'Ask if they can take delivery today'
                : 'Ask if they are in to hand over items';

            // bare message screen
            document.getElementById('msg-name-display').textContent   = name;
            document.getElementById('msg-number-display').textContent = number;
            document.getElementById('bare-sms-btn').href = `sms:${number}`;

            // availability message
            const availBody = isDelivery
                ? `Hello ${firstName}, this is Hidden Help. We would like to deliver today the items you have requested from us. Please can you confirm you are available to take delivery? Thank you.`
                : `Hello ${firstName}, this is Hidden Help. We are in your area today and would like to collect the items you have kindly offered to donate. Please can you confirm you are available? Thank you.`;
            document.getElementById('avail-message').textContent = availBody;
            document.getElementById('avail-sms-btn').href =
                `sms:${number}&body=${encodeURIComponent(availBody)}`;

            // ETA screen ref/name
            document.getElementById('eta-ref-label').textContent  = ref ? `${refLabel} ${ref}` : '';
            document.getElementById('eta-name-label').textContent = name;
        }

        // ── screen switching ──────────────────────────────────────────────
        const allScreens = [
            'screen-main', 'screen-message', 'screen-avail',
            'screen-eta-loading', 'screen-eta-error', 'screen-eta-result',
            'screen-param-error'
        ];

        function show(id) {
            allScreens.forEach(s => {
                document.getElementById(s).classList.toggle('active', s === id);
            });
        }

        // ── ETA ───────────────────────────────────────────────────────────
        function startETA() {
            show('screen-eta-loading');
            if (!navigator.geolocation) {
                showETAError('Geolocation is not supported on this device.');
                return;
            }
            navigator.geolocation.getCurrentPosition(
                pos => calculateETA(pos.coords.latitude, pos.coords.longitude),
                err => {
                    const msgs = {
                        1: 'Location access denied. Please allow location access and try again.',
                        2: 'Location unavailable. Please try again.',
                        3: 'Location request timed out. Please try again.',
                    };
                    showETAError(msgs[err.code] || 'Could not get your location. Please try again.');
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 30000 }
            );
        }

        async function calculateETA(driverLat, driverLon) {
            const url = `https://router.project-osrm.org/route/v1/driving/` +
                        `${driverLon},${driverLat};${destLon},${destLat}?overview=false`;
            try {
                const response = await fetch(url);
                const data     = await response.json();
                if (data.code !== 'Ok') {
                    showETAError('Could not calculate route. Please try again.');
                    return;
                }
                const durationMins = data.routes[0].duration / 60;
                const etaTime      = new Date(Date.now() + durationMins * 60 * 1000);
                const etaRounded   = roundUpTo5(etaTime);
                const etaMins      = Math.round((etaRounded - Date.now()) / 60000);
                const etaStr       = formatTime(etaRounded);

                const smsBody = `Hello ${firstName}, this is Hidden Help. ` +
                    (isDelivery
                        ? `We are on our way to deliver your items and should arrive around ${etaStr}. `
                        : `We are on our way to collect your donated items and should arrive around ${etaStr}. `) +
                    `No need to respond to this message. See you shortly.`;

                document.getElementById('eta-time').textContent    = etaStr;
                document.getElementById('eta-mins').textContent    = `${etaMins} minutes from now`;
                document.getElementById('eta-message').textContent = smsBody;
                document.getElementById('eta-sms-btn').href =
                    `sms:${number}&body=${encodeURIComponent(smsBody)}`;

                show('screen-eta-result');
            } catch (err) {
                showETAError('Network error calculating route. Please try again.');
            }
        }

        function showETAError(msg) {
            document.getElementById('eta-error-msg').textContent = msg;
            show('screen-eta-error');
        }

        function roundUpTo5(date) {
            return new Date(Math.ceil(date.getTime() / (5 * 60 * 1000)) * (5 * 60 * 1000));
        }

        function formatTime(date) {
            let h    = date.getHours();
            let m    = date.getMinutes();
            const ap = h >= 12 ? 'PM' : 'AM';
            h        = h % 12 || 12;
            return `${h}:${m.toString().padStart(2, '0')} ${ap}`;
        }
    </script>
</body>
</html>
