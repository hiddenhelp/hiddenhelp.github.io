<script>
window.addEventListener('load', function () {
  var p = new URLSearchParams(window.location.search);
  var lat = parseFloat(p.get('lat')), lon = parseFloat(p.get('lon'));
  if (isNaN(lat) || isNaN(lon)) return;
  var key = Object.keys(window).find(function (k) { return k.indexOf('map_') === 0 && window[k] instanceof L.Map; });
  if (!key) return;
  var map = window[key];
  // ponytail: fixed zoom, not fitBounds — fitBounds needs a laid-out container,
  // which webviews may not have at load (innerWidth reads 0 there, so they get 10).
  map.setView([lat, lon], window.innerWidth > 700 ? 11 : 10);
  var ref = (p.get('ref') || '').trim();
  var found = null;
  if (ref) {
    document.querySelectorAll('.leaflet-marker-pane .leaflet-marker-icon').forEach(function (el) {
      if (!found && el.textContent.trim() === ref) found = el;
    });
  }
  if (found) {
    found.classList.add('hh-focus');
  } else {
    var pin = '<svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 24 24" fill="darkred" stroke="white" stroke-width="1"><path d="M12 2C8.1 2 5 5.1 5 9c0 5.2 7 13 7 13s7-7.8 7-13c0-3.9-3.1-7-7-7z"/><circle cx="12" cy="9" r="2.5" fill="white"/></svg>';
    L.marker([lat, lon], {
      icon: L.divIcon({ html: '<div class="hh-focus">' + pin + '</div>', className: '', iconSize: [34, 34], iconAnchor: [17, 34] }),
      interactive: false
    }).addTo(map);
  }
});
</script>
